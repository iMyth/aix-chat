version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aix-postgres
    environment:
      POSTGRES_USER: aix
      POSTGRES_PASSWORD: aix123
      POSTGRES_DB: aix_chat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aix"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
